name: Release — Homebrew tap

# Bumps the kovra formula in the tap kaeus-inc/homebrew-kovra (KOV-49, Pillar 3)
# to the just-released tag: recomputes the source-tarball sha256 and opens a PR
# against the tap (brew bump-formula-pr style).
#
# INERT BY DEFAULT. Gated on `KOVRA_PUBLISH_ENABLED == 'true'` AND the
# `HOMEBREW_TAP_TOKEN` secret (a PAT with write access to the tap repo), neither
# of which exists before go-live (KOV-51). The tap repo itself is created at
# go-live. Runs on free GitHub-hosted runners.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    if: ${{ vars.KOVRA_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Bump kovra in the tap
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          # PAT with write access to kaeus-inc/homebrew-kovra (set at go-live).
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # The action wants the tap's GitHub repo name (taps live in
          # `homebrew-<name>` repos); users still `brew install kaeus-inc/kovra/kovra`.
          tap: kaeus-inc/homebrew-kovra
          formula: kovra
          tag: ${{ github.ref_name }}
