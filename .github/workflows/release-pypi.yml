name: Release — PyPI

# Builds and publishes the Python artifacts (KOV-49, Pillar 3):
#   - kovra-ffi : the PyO3 abi3 wheel (built by maturin)
#   - kovra-mcp : the MCP server sdist + wheel (built by uv)
#
# INERT BY DEFAULT. The publish step is gated on `KOVRA_PUBLISH_ENABLED == 'true'`
# AND the `PYPI_TOKEN` secret, neither of which exists before go-live (KOV-51).
# The build steps are safe to run anytime; nothing is uploaded until the gate is
# open. Runs on free GitHub-hosted runners.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    if: ${{ vars.KOVRA_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install uv + maturin
        run: pipx install uv maturin

      - name: Build kovra-ffi wheel (maturin, abi3)
        run: maturin build --release -m crates/ffi-python/Cargo.toml

      - name: Build kovra-mcp sdist + wheel (uv)
        working-directory: mcp
        run: uv build

      - name: Publish to PyPI
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          set -euo pipefail
          # maturin built the ffi wheel into the workspace target/wheels dir.
          maturin upload --skip-existing target/wheels/*.whl
          uv publish mcp/dist/*
