name: Release — crates.io

# Publishes the kovra crates to crates.io (KOV-49, Pillar 3).
#
# INERT BY DEFAULT. This workflow does nothing until go-live (KOV-51): the
# publish job is gated on the repo variable `KOVRA_PUBLISH_ENABLED == 'true'`
# AND the `CARGO_REGISTRY_TOKEN` secret, neither of which exists before go-live.
# A tag push or manual dispatch alone is a no-op. Flip the variable (and add the
# token) only when the public repo is live and the real publish is intended.
#
# Runs on free GitHub-hosted runners (public repo).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-cargo
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ vars.KOVRA_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps (libdbus for the keyring crate)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: cargo publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail
          # Inward-out order: every crate must already be on crates.io before a
          # crate that depends on it can publish. `kovra-ffi` is intentionally
          # excluded — it ships to PyPI as a maturin wheel, not as a crate. The
          # binary crate publishes last under its reserved name `kovra`.
          #
          # Idempotent: a crate version already on crates.io is skipped, so a
          # re-run after a partial failure (e.g. crates.io's new-crate rate limit
          # throttling a burst) completes the remaining crates instead of aborting
          # on "already uploaded".
          for crate in \
            kovra-core \
            kovra-wrapper \
            kovra-agent \
            kovra-native-macos \
            kovra-providers-azure \
            kovra-providers-aws \
            kovra-webui \
            kovra; do
            echo "::group::cargo publish -p ${crate}"
            if out=$(cargo publish -p "${crate}" 2>&1); then
              echo "$out"
              echo "::notice::published ${crate}"
              # crates.io needs a moment to index a new crate before a dependent
              # can resolve it from the registry.
              sleep 30
            else
              echo "$out"
              if echo "$out" | grep -qiE 'already (uploaded|exists)|is already uploaded'; then
                echo "::notice::${crate} already on crates.io — skipping"
              else
                echo "::error::${crate} publish failed"; exit 1
              fi
            fi
            echo "::endgroup::"
          done
